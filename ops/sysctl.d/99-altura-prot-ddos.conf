# AlturaProt host-edge TCP hardening template.
# Review before installing under /etc/sysctl.d/ and apply with: sysctl --system

# Keep SYN floods from consuming connection state as easily.
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 16384
net.ipv4.tcp_synack_retries = 3

# Allow larger accept queues for short bursts. Keep this above configured
# http.listen_backlog and tcp[].listen_backlog values.
net.core.somaxconn = 65535

# Allow the kernel to queue more packets during short host-visible bursts before
# userspace accepts them. Size this with NIC rate, CPU, and RAM in mind.
net.core.netdev_max_backlog = 250000

# Reclaim dead TCP state faster during floods.
net.ipv4.tcp_fin_timeout = 15

# Increase conntrack capacity for hosts that route traffic through nftables
# conntrack. Size this for RAM and real traffic; do not blindly apply on small VMs.
net.netfilter.nf_conntrack_max = 1048576

# Reclaim half-open tracked TCP handshakes faster when protected ports are under
# SYN pressure. Do not set below expected high-latency client handshake times.
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 30

# Bound incomplete IP fragment queues so fragment floods cannot pin kernel
# reassembly memory for long periods before AlturaProt can classify traffic.
# Modern TCP services should rely on MSS/PMTUD instead of IP fragmentation.
net.ipv4.ipfrag_high_thresh = 4194304
net.ipv4.ipfrag_time = 15
net.ipv4.ipfrag_max_dist = 64
net.ipv6.ip6frag_high_thresh = 4194304
net.ipv6.ip6frag_low_thresh = 3145728
net.ipv6.ip6frag_time = 15

# Reverse path filtering can reduce spoofed-source traffic on simple single-homed
# hosts. Do not enable strict rp_filter on asymmetric routing, tunnels, or BGP
# edge hosts without validating return paths.
# net.ipv4.conf.all.rp_filter = 1
# net.ipv4.conf.default.rp_filter = 1
